spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        login-username: druid
        login-password: druid
  redis:
    host: ${REDIS_HOST:redis}
    database: 0
    port: 6379
    password:
    timeout: 300ms

minio:
  endpoint: http://${MINIO_HOST:minio}:9000
  bucketName: mall
  accessKey: minioadmin
  secretKey: minioadmin

logging:
  file:
    path: /var/logs
  level:
    root: info
    com.macro.mall: info

logstash:
  host: logstash
  enableInnerLog: false

agent:
  service:
    url: http://agent-service:8000
