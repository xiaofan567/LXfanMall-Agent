server:
  port: 8085

spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:mysql}:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:root}
    druid:
      initial-size: 5
      min-idle: 10
      max-active: 20
      web-stat-filter:
        exclusions: "*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*"
      stat-view-servlet:
        login-username: druid
        login-password: druid

  data:
    mongodb:
      host: ${MONGO_HOST:mongo}
      port: 27017
      database: mall-port

  redis:
    host: ${REDIS_HOST:redis}
    database: 0
    port: 6379
    password:
    timeout: 300ms

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    virtual-host: /mall
    username: mall
    password: mall

mongo:
  insert:
    sqlEnable: true

logging:
  file:
    path: /var/logs
  level:
    root: info
    com.macro.mall: info

logstash:
  host: logstash
  enableInnerLog: false

alipay:
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do
  appId: ${ALIPAY_APP_ID:your appId}
  alipayPublicKey: ${ALIPAY_PUBLIC_KEY:your alipayPublicKey}
  appPrivateKey: ${ALIPAY_PRIVATE_KEY:your appPrivateKey}
  returnUrl: ${ALIPAY_RETURN_URL:http://localhost:8060/#/pages/money/paySuccess}
  notifyUrl: ${ALIPAY_NOTIFY_URL:}
