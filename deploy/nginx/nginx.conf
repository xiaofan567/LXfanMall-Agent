user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ==================== 演示模式：拦截写操作 ====================
    # C 端白名单（mall-portal，放行登录/登出/支付回调）
    map $request_uri $c_block_write {
        default 1;
        ~^/api/(sso/login|sso/logout|alipay/notify)  0;
    }
    # B 端白名单（mall-admin，放行登录/登出）
    map $request_uri $b_block_write {
        default 1;
        ~^/api/(admin/login|admin/logout)  0;
    }

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ==================== C 端 (端口 80) ====================
    server {
        listen       80;
        server_name  _;

        location / {
            root   /usr/share/nginx/html/c;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # 演示模式：拦截写操作（POST/PUT/DELETE），白名单放行
            if ($request_method !~* ^(GET|HEAD|OPTIONS)$) {
                set $block $c_block_write;
            }
            if ($block = 1) {
                return 403 '{"code":403,"message":"演示模式，禁止修改数据","data":null}';
            }
            proxy_pass http://mall-portal:8085/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /search-api/ {
            proxy_pass http://mall-search:8081/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /agent-api/ {
            proxy_pass http://agent-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            sub_filter_types text/plain;  # ← 覆盖父级的 application/json，等效禁用 sub_filter
            proxy_set_header Accept-Encoding '';  # ← 禁用后端 gzip
        }
        
        # 代理图片：OSS 优先（存量数据），MinIO 兜底（新数据）
        location /mall/ {
            resolver 127.0.0.11 valid=30s ipv6=off;
            proxy_pass https://macro-oss.oss-cn-shenzhen.aliyuncs.com$request_uri;
            proxy_set_header Referer "";
            proxy_set_header Host macro-oss.oss-cn-shenzhen.aliyuncs.com;
            proxy_ssl_server_name on;
            proxy_intercept_errors on;
            error_page 404 = @minio_fallback;
        }
        location @minio_fallback {
            proxy_pass http://minio:9000$request_uri;
            proxy_set_header Referer "";
            proxy_set_header Host minio:9000;
        }
        # 将数据库中的图片 URL 重写为相对路径（新旧两种格式）
        sub_filter 'http://localhost:9090/mall/' '/mall/';
        sub_filter 'http://macro-oss.oss-cn-shenzhen.aliyuncs.com/mall/' '/mall/';
        sub_filter_types application/json text/html;
        sub_filter_once off;
    }

    # ==================== B 端 (端口 8080) ====================
    server {
        listen       8080;
        server_name  _;

        location / {
            root   /usr/share/nginx/html/admin;
            index  index.html;
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            # 演示模式：拦截写操作，白名单放行登录/登出
            if ($request_method !~* ^(GET|HEAD|OPTIONS)$) {
                set $block $b_block_write;
            }
            if ($block = 1) {
                return 403 '{"code":403,"message":"演示模式，禁止修改数据","data":null}';
            }
            proxy_pass http://mall-admin:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        location /rag/ {
            # 演示模式：RAG 知识库只允许读取（GET），禁止上传/删除
            if ($request_method !~* ^(GET|HEAD|OPTIONS)$) {
                return 403 '{"code":403,"message":"演示模式，禁止修改数据","data":null}';
            }
            proxy_pass http://mall-admin:8080/rag/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        
    }
}